# ─────────────────────────────────────────────────────────────────────────────
# Container Images — build and publish the AffectLog service images to GHCR.
#
# AffectLog – Trustworthy AI Assessment · Prometheus-X BB04 / EDGE-Skills.
#
# This workflow builds the three runtime images (API, Celery worker, frontend)
# and publishes them to the GitHub Container Registry (ghcr.io). It can run:
#   • standalone        — on a version tag push (v*) or manual dispatch, or
#   • as a reusable step — called from the CI/CD pipeline (deploy.yml).
#
# SECURITY: every third-party action is pinned to a full commit SHA (not a
# floating tag) to prevent supply-chain tampering, per GitHub hardening guidance
# and SonarQube rule "Use full commit SHA hash for this dependency". The trailing
# comment records the human-readable version the SHA corresponds to.
# ─────────────────────────────────────────────────────────────────────────────
name: Container Images

on:
  # Allow this workflow to be invoked as a reusable step by deploy.yml.
  workflow_call:
  # Publish images for tagged releases.
  push:
    tags:
      - "v*"
  # Allow manual publication from the Actions tab.
  workflow_dispatch:

# Least-privilege token: read the repository, write packages (GHCR). No more.
permissions:
  contents: read
  packages: write

# Never run two publish jobs for the same ref concurrently; do not cancel an
# in-flight publish, as a half-pushed manifest is worse than a queued one.
concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: Dockerfile
          - name: worker
            context: .
            dockerfile: Dockerfile.worker
          - name: frontend
            context: src/affectlog/frontend
            dockerfile: src/affectlog/frontend/Dockerfile.frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve lowercase image reference
        # GHCR requires lowercase names; ${VAR,,} lowercases the owner/repo.
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}-${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Authenticate to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and OCI labels
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=AffectLog ${{ matrix.name }}
            org.opencontainers.image.vendor=AffectLog / Prometheus-X

      - name: Build and push image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Supply-chain provenance + SBOM for downstream verification.
          provenance: true
          sbom: true
          # Reuse the GitHub Actions build cache to keep CI fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
