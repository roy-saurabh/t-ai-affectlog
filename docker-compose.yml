version: "3.9"

# AffectLog – Trustworthy AI Assessment
# Prometheus-X BB04 / EDGE-Skills
# Full-stack Docker Compose: API + Worker + Frontend + Postgres + Redis + Mailpit

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-affectlog}
      # Password is supplied via .env (gitignored). Compose fails fast if unset —
      # no credential is ever committed to source control.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-affectlog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affectlog}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mailpit (local dev email sink) ────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

  # ── API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AFFECTLOG_APP_ENV: development
      AFFECTLOG_APP_BASE_URL: http://localhost:3000
      AFFECTLOG_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-affectlog}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}@postgres:5432/${POSTGRES_DB:-affectlog}
      AFFECTLOG_REDIS_URL: redis://redis:6379/0
      AFFECTLOG_CELERY_BROKER_URL: redis://redis:6379/0
      AFFECTLOG_CELERY_RESULT_BACKEND: redis://redis:6379/1
      AFFECTLOG_SECRET_KEY: ${AFFECTLOG_SECRET_KEY:-dev-secret-change-in-prod-min-32-chars!!}
      AFFECTLOG_PASSWORD_PEPPER: ${AFFECTLOG_PASSWORD_PEPPER:-dev-pepper-change-in-prod}
      AFFECTLOG_HASH_SECRET: ${AFFECTLOG_HASH_SECRET:-dev-hash-secret-change-in-prod}
      AFFECTLOG_LOG_LEVEL: INFO
      AFFECTLOG_DATA_DIR: /app/data
      AFFECTLOG_RUNS_DIR: /app/runs
      AFFECTLOG_UPLOADS_DIR: /app/data/uploads
      AFFECTLOG_ALLOW_RAW_IDENTIFIERS: "false"
      AFFECTLOG_PSEUDONYMIZE: "true"
      AFFECTLOG_EMAIL_SEND_ENABLED: "false"
      AFFECTLOG_SMTP_HOST: mailpit
      AFFECTLOG_SMTP_PORT: "1025"
      AFFECTLOG_SMTP_USERNAME: ""
      AFFECTLOG_SMTP_PASSWORD: ""
      AFFECTLOG_SMTP_FROM_EMAIL: noreply@affectlog.local
      AFFECTLOG_SMTP_USE_TLS: "false"
      AFFECTLOG_DEV_SHOW_ACTIVATION_LINK: "true"
      AFFECTLOG_CORS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
      AFFECTLOG_COOKIE_SECURE: "false"
      AFFECTLOG_PUBLIC_REGISTRATION_ENABLED: "true"
      AFFECTLOG_ADMIN_APPROVAL_REQUIRED: "true"
      AFFECTLOG_RAW_EXPORTS_ENABLED: "false"
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - ./configs:/app/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      AFFECTLOG_APP_ENV: development
      AFFECTLOG_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-affectlog}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}@postgres:5432/${POSTGRES_DB:-affectlog}
      AFFECTLOG_REDIS_URL: redis://redis:6379/0
      AFFECTLOG_CELERY_BROKER_URL: redis://redis:6379/0
      AFFECTLOG_CELERY_RESULT_BACKEND: redis://redis:6379/1
      AFFECTLOG_SECRET_KEY: ${AFFECTLOG_SECRET_KEY:-dev-secret-change-in-prod-min-32-chars!!}
      AFFECTLOG_HASH_SECRET: ${AFFECTLOG_HASH_SECRET:-dev-hash-secret-change-in-prod}
      AFFECTLOG_LOG_LEVEL: INFO
      AFFECTLOG_DATA_DIR: /app/data
      AFFECTLOG_RUNS_DIR: /app/runs
      AFFECTLOG_ALLOW_RAW_IDENTIFIERS: "false"
    volumes:
      - ./data:/app/data
      - ./runs:/app/runs
      - ./configs:/app/configs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: src/affectlog/frontend
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

  # ── Nginx reverse proxy (optional production example) ─────────────────
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #     - frontend

volumes:
  postgres_data:
  redis_data:
