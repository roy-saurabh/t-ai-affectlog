# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud configuration (read by SonarCloud Automatic Analysis).
#
# AffectLog – Trustworthy AI Assessment · Prometheus-X BB04 / EDGE-Skills.
#
# This file supplies analysis *precision* settings (runtime version and the
# product-vs-tooling source boundary) plus a small set of *documented*
# false-positive suppressions for rules that misfire on by-design security
# constants (see sonar.issue.ignore.* at the bottom). Genuine issues remain in
# scope and are triaged in the SonarCloud UI.
# ─────────────────────────────────────────────────────────────────────────────

# SonarCloud project binding (used by the CI-based scan in
# .github/workflows/sonar.yml, which runs only on the edge_affectlog mirror).
sonar.organization=roy-saurabh
sonar.projectKey=roy-saurabh_edge_affectlog

# Declare the exact runtime. Without this, SonarCloud analyses the code "as
# compatible with all Python 3 versions" and reports secure 3.10+ defaults
# (e.g. ssl.create_default_context, which uses TLS 1.2+) as if they could run on
# legacy Python — producing false-positive CRITICAL weak-TLS findings (S4423).
# The project requires Python 3.11 (see pyproject.toml).
sonar.python.version=3.11
sonar.javascript.environments=browser,node

# Test coverage (produced by the CI scan job: pytest --cov-report=xml).
sonar.python.coverage.reportPaths=coverage.xml

# Product source under analysis.
sonar.sources=src,configs
sonar.tests=tests

# Exclude code that is not shipped product: generated frontend bundles, Node
# dev/build scripts, the data-generation and ops scripts, sample data and
# worked examples. These are developer tooling, not the runtime component.
sonar.exclusions=\
  src/affectlog/frontend/dist/**,\
  src/affectlog/frontend/node_modules/**,\
  src/affectlog/frontend/scripts/**,\
  scripts/**,\
  data/**,\
  examples/**,\
  **/*.min.js,\
  **/*.min.css

# Tests are analysed for test-specific rules, not counted as product code.
sonar.test.inclusions=tests/**

# ── Documented false-positive suppressions ───────────────────────────────────
# S1313 "hardcoded IP address" fires on the RFC 1918 / link-local network
# ranges (10.0.0.0, 172.16.0.0, 192.168.0.0, 169.254.0.0, ::1, fc00::, fe80::)
# that the SSRF guard checks against. These are the canonical private-range
# constants the security control is *defined* by — they must be literal, so the
# rule is suppressed only on the two SSRF-guard modules.
sonar.issue.ignore.multicriteria=ssrf1,ssrf2
sonar.issue.ignore.multicriteria.ssrf1.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.ssrf1.resourceKey=src/affectlog/wizard/executor.py
sonar.issue.ignore.multicriteria.ssrf2.ruleKey=python:S1313
sonar.issue.ignore.multicriteria.ssrf2.resourceKey=src/affectlog/wizard/inspector.py
