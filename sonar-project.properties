# ─────────────────────────────────────────────────────────────────────────────
# SonarCloud configuration (read by SonarCloud Automatic Analysis).
#
# AffectLog – Trustworthy AI Assessment · Prometheus-X BB04 / EDGE-Skills.
#
# This file only supplies analysis *precision* settings (runtime version and the
# product-vs-tooling source boundary). It does NOT suppress findings in product
# code — genuine and false-positive issues in `src/` remain in scope and are
# triaged in the SonarCloud UI ("False Positive" / "Won't Fix" with a reason).
# ─────────────────────────────────────────────────────────────────────────────

# SonarCloud project binding (used by the CI-based scan in
# .github/workflows/sonar.yml, which runs only on the edge_affectlog mirror).
sonar.organization=roy-saurabh
sonar.projectKey=roy-saurabh_edge_affectlog

# Declare the exact runtime. Without this, SonarCloud analyses the code "as
# compatible with all Python 3 versions" and reports secure 3.10+ defaults
# (e.g. ssl.create_default_context, which uses TLS 1.2+) as if they could run on
# legacy Python — producing false-positive CRITICAL weak-TLS findings (S4423).
# The project requires Python 3.11 (see pyproject.toml).
sonar.python.version=3.11
sonar.javascript.environments=browser,node

# Product source under analysis.
sonar.sources=src,configs
sonar.tests=tests

# Exclude code that is not shipped product: generated frontend bundles, Node
# dev/build scripts, the data-generation and ops scripts, sample data and
# worked examples. These are developer tooling, not the runtime component.
sonar.exclusions=\
  src/affectlog/frontend/dist/**,\
  src/affectlog/frontend/node_modules/**,\
  src/affectlog/frontend/scripts/**,\
  scripts/**,\
  data/**,\
  examples/**,\
  **/*.min.js,\
  **/*.min.css

# Tests are analysed for test-specific rules, not counted as product code.
sonar.test.inclusions=tests/**
