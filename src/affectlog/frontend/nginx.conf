server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /v1 {
        proxy_pass http://api:8000;
    }
    location /docs {
        proxy_pass http://api:8000;
    }
    location /openapi.json {
        proxy_pass http://api:8000;
    }
    location /healthz {
        proxy_pass http://api:8000;
    }
}
